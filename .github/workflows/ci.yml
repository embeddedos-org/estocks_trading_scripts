name: CI — Stocks Plugin Self-Learning Agent

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pytest pytest-cov pytest-asyncio
          pip install lightgbm joblib  # ML regime classifier
          pip install pyyaml python-dotenv requests
          pip install fastapi uvicorn httpx pydantic  # webhook server
          # Optional (may fail on some systems):
          pip install vaderSentiment || true
          pip install yfinance feedparser || true

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests/test_self_learning.py -v --tb=short

      - name: Run broker integration tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests/test_integration_all_brokers.py -v --tb=short

      - name: Run simulated broker CI tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests/test_ci_simulation.py -v --tb=short -s

      - name: Run all tests with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests/ -v --tb=short --cov=shared --cov=strategies --cov-report=term-missing -m "not slow and not ml" || true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check shared/ strategies/ tests/ --select E,W,F --ignore E501,W503 || true

  simulate:
    name: Simulated Trading Session
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pandas numpy pytest lightgbm joblib

      - name: Run full simulated trading session
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests/test_ci_simulation.py::TestAgentWithSimulator -v -s --tb=short

      - name: Print simulation results
        if: always()
        run: |
          echo "=== Simulated Trading Complete ==="
          echo "Check test output above for per-broker results"
