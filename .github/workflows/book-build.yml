name: Build & Release Book PDF

on:
  push:
    branches: [master, main]
    paths:
      - 'docs/book/**'
  pull_request:
    paths:
      - 'docs/book/**'
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: book-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════
  # 1. VALIDATE BOOK SOURCE
  # ═══════════════════════════════════════════════════
  validate:
    name: Validate Book Source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check book source exists
        run: |
          if [ ! -f docs/book/book.md ]; then
            echo "ERROR: docs/book/book.md not found"
            exit 1
          fi
          LINES=$(wc -l < docs/book/book.md)
          echo "Book source: $LINES lines"
          if [ "$LINES" -lt 100 ]; then
            echo "ERROR: Book too short ($LINES lines, minimum 100)"
            exit 1
          fi
          echo "lines=$LINES" >> $GITHUB_OUTPUT

      - name: Check for control characters
        run: |
          if grep -Pn '[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]' docs/book/book.md; then
            echo "WARNING: Found control characters — cleaning"
            sed -i 's/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]//g' docs/book/book.md
          else
            echo "OK: No control characters found"
          fi

      - name: Validate markdown structure
        run: |
          # Check for at least one top-level heading
          if ! grep -q "^# " docs/book/book.md; then
            echo "WARNING: No top-level heading found"
          fi
          # Count chapters (## headings)
          CHAPTERS=$(grep -c "^## " docs/book/book.md || echo 0)
          echo "Chapters found: $CHAPTERS"
          # Check for author attribution
          if grep -qi "Srikanth Patchava" docs/book/book.md; then
            echo "OK: Author attribution present"
          else
            echo "WARNING: Author attribution missing"
          fi

  # ═══════════════════════════════════════════════════
  # 2. BUILD PDF
  # ═══════════════════════════════════════════════════
  build-pdf:
    name: Build PDF
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc & LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-fonts-extra

      - name: Clean control characters
        run: sed -i 's/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]//g' docs/book/book.md

      - name: Extract metadata
        id: meta
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT
          LINES=$(wc -l < docs/book/book.md)
          echo "lines=$LINES" >> $GITHUB_OUTPUT
          # Extract title from first heading or use repo name
          TITLE=$(head -5 docs/book/book.md | grep "^# " | head -1 | sed 's/^# //')
          if [ -z "$TITLE" ]; then TITLE="$REPO_NAME — Official Guide"; fi
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "pdf_name=${REPO_NAME}-guide.pdf" >> $GITHUB_OUTPUT

      - name: Generate PDF
        run: |
          pandoc \
            docs/book/book.md \
            -o "docs/book/${{ steps.meta.outputs.pdf_name }}" \
            --pdf-engine=xelatex \
            --from=markdown+smart \
            -V geometry:margin=1in \
            -V fontsize=11pt \
            -V documentclass=report \
            -V "title=${{ steps.meta.outputs.title }}" \
            -V "author=Srikanth Patchava \& EmbeddedOS Contributors" \
            -V "date=$(date +'%B %Y')" \
            -V toc=true \
            -V toc-depth=3 \
            -V colorlinks=true \
            -V linkcolor=blue \
            -V urlcolor=blue \
            --highlight-style=tango \
            --number-sections

      - name: Verify PDF
        run: |
          PDF="docs/book/${{ steps.meta.outputs.pdf_name }}"
          if [ ! -f "$PDF" ]; then
            echo "ERROR: PDF not generated"
            exit 1
          fi
          SIZE=$(du -h "$PDF" | cut -f1)
          echo "PDF generated: $PDF ($SIZE)"
          echo "pdf_path=$PDF" >> $GITHUB_OUTPUT

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: book-pdf
          path: docs/book/${{ steps.meta.outputs.pdf_name }}
          retention-days: 90

  # ═══════════════════════════════════════════════════
  # 3. ATTACH PDF TO RELEASE (only on release event)
  # ═══════════════════════════════════════════════════
  release-pdf:
    name: Attach PDF to Release
    runs-on: ubuntu-latest
    needs: build-pdf
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Download PDF artifact
        uses: actions/download-artifact@v4
        with:
          name: book-pdf
          path: ./pdf-output

      - name: Extract repo name
        id: meta
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          echo "pdf_name=${REPO_NAME}-guide.pdf" >> $GITHUB_OUTPUT

      - name: Upload PDF to release
        uses: softprops/action-gh-release@v2
        with:
          files: ./pdf-output/${{ steps.meta.outputs.pdf_name }}
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════
  # 4. SUMMARY
  # ═══════════════════════════════════════════════════
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [validate, build-pdf]
    if: always()
    steps:
      - name: Report
        run: |
          echo "## Book Build Report"
          echo ""
          echo "| Step | Status |"
          echo "|------|--------|"
          echo "| Validation | ${{ needs.validate.result }} |"
          echo "| PDF Build | ${{ needs.build-pdf.result }} |"
          echo ""
          if [ "${{ needs.build-pdf.result }}" = "success" ]; then
            echo "PDF artifact available for download."
          fi
